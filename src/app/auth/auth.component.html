<div class="min-h-screen bg-gradient-to-br from-green-100 to-green-300 flex items-center justify-center py-8 px-4 sm:px-6">
  <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 w-full max-w-md border border-gray-300">
    <!-- Title -->
    <h1 class="text-3xl sm:text-4xl font-bold text-green-800 text-center mb-2">
      🕌 Islamic Streak
    </h1>
    <p class="text-gray-600 text-center mb-6">
      {{ isLogin ? 'Login to your account' : 'Create a new account' }}
    </p>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm">
      {{ errorMessage }}
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm">
      {{ successMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="handleSubmit()" class="space-y-4">
      <!-- Display Name (Register only) -->
      <div *ngIf="!isLogin">
        <label class="block text-gray-700 font-semibold mb-2 text-sm">Name</label>
        <input
          type="text"
          [(ngModel)]="displayName"
          name="displayName"
          placeholder="Your full name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition bg-white text-gray-900 text-sm"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2 text-sm">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition bg-white text-gray-900 text-sm"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2 text-sm">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition bg-white text-gray-900 text-sm"
        />
      </div>

      <!-- Confirm Password (Register only) -->
      <div *ngIf="!isLogin">
        <label class="block text-gray-700 font-semibold mb-2 text-sm">Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition bg-white text-gray-900 text-sm"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full px-4 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition disabled:bg-gray-400 mt-6"
      >
        {{ loading ? 'Please wait...' : (isLogin ? 'Login' : 'Create Account') }}
      </button>
    </form>

    <!-- Toggle Mode -->
    <p class="text-center text-gray-600 mt-6">
      {{ isLogin ? "Don't have an account?" : 'Already have an account?' }}
      <button
        type="button"
        (click)="toggleMode()"
        class="text-green-600 font-bold hover:text-green-700 transition"
      >
        {{ isLogin ? 'Register' : 'Login' }}
      </button>
    </p>

    <!-- Info -->
    <p class="text-xs text-gray-500 text-center mt-4">
      Your streaks will be synced across all devices
    </p>
  </div>
</div>
